---
layout: default
---

{{ content }}

{%- if site.posts.size > 0 -%}
<ul class="explorer">
  {%- for post in site.posts -%}
  {%- assign format = "%d/%m/%Y" -%}
  <li>
    <span class="post_info">[{{ post.date | date: format }}] <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a></span>
    <span class="post_author"><a href="{{ post.author_url }}">@{{ post.author }}</a></span></li>
  {%- endfor -%}
</ul>
{%- endif -%}
